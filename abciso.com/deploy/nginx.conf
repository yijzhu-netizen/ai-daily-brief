server {
    listen 80;
    server_name abciso.com www.abciso.com;
    root /var/www/abciso;
    index index.html;

    charset utf-8;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript image/svg+xml;
    gzip_min_length 1000;

    # Cache static assets
    location /images/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /favicon.svg {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # HTML - no cache for fresh content
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public";
    }

    # Clean URLs redirect (optional)
    location = /course {
        return 301 /course.html;
    }
    location = /download {
        return 301 /download.html;
    }
    location = /about {
        return 301 /about.html;
    }
    location = /news {
        return 301 /news.html;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # 404
    error_page 404 /index.html;

    # HTTPS redirect (enable after cert)
    # listen 443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/abciso.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/abciso.com/privkey.pem;
}
