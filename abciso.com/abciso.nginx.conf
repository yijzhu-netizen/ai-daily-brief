# abciso.com — Nginx 配置
# 部署位置：/var/www/abciso.com/

server {
    listen 80;
    server_name abciso.com www.abciso.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name abciso.com www.abciso.com;

    root /var/www/abciso.com;
    index index.html;

    # SSL（上线后替换为真实证书）
    ssl_certificate     /etc/letsencrypt/live/abciso.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abciso.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Gzip
    gzip on;
    gzip_types text/html text/css text/plain application/javascript image/svg+xml;
    gzip_min_length 1024;

    # 静态资源缓存
    location /images/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /favicon.svg {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 页面路由
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 日志
    access_log /var/log/nginx/abciso.com.access.log;
    error_log  /var/log/nginx/abciso.com.error.log;
}
